<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Embershard</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }

      body {
        background: #111;
        width: 100vw;
        height: 100vh;
        overflow: hidden;
        padding: 50px;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      /*
       * game-layout max-width formula:
       *   canvas-wrapper height = (available - hud-top) * 3/4
       *   canvas width at 2:1   = canvas-wrapper height * 2
       *   available             = 100vh - 100px (body padding)
       *   hud-top               = 42px (36px height + 6px padding-bottom)
       *
       *   max-width = (100vh - 100px - 42px) * 0.75 * 2
       *             = (100vh - 142px) * 1.5
       *
       * This constrains the layout column to the canvas width so that
       * the HP/MP bars and the inventory strip align exactly with the
       * left and right edges of the playing area.
       */
      .game-layout {
        display: flex;
        flex-direction: column;
        width: 100%;
        height: 100%;
        max-width: calc((100vh - 142px) * 1.5);
      }

      /* ── Top HUD: HP and MP bars ─────────────────────── */
      .hud-top {
        flex-shrink: 0;
        display: flex;
        align-items: center;
        gap: 8px;
        height: 36px;
        padding-bottom: 6px;
      }

      .resource-bar {
        position: relative;
        width: 20%;
        height: 100%;
        background: rgba(10, 10, 15, 0.72);
        border: 2px solid rgba(210, 210, 220, 0.88);
        overflow: hidden;
      }

      .bar-track {
        position: absolute;
        inset: 3px;
        background: rgba(255, 255, 255, 0.18);
      }

      .bar-fill {
        height: 100%;
        width: 100%;
        position: relative;
      }

      .bar-fill::after {
        content: '';
        position: absolute;
        inset: 0;
        background: linear-gradient(
          to bottom,
          rgba(255, 255, 255, 0.38) 0%,
          rgba(255, 255, 255, 0.00) 52%,
          rgba(0, 0, 0, 0.22) 100%
        );
        pointer-events: none;
      }

      .health-fill { background: rgba(200, 35, 35, 0.92); }
      .mana-fill   { background: rgba(30,  80, 210, 0.92); }

      .bar-label {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        color: rgba(255, 255, 255, 0.95);
        font-family: monospace;
        font-size: 13px;
        font-weight: bold;
        text-shadow:
          1px  1px 0 #000,
         -1px -1px 0 #000,
          1px -1px 0 #000,
         -1px  1px 0 #000;
        white-space: nowrap;
        pointer-events: none;
        z-index: 1;
      }

      /* ── Canvas: 3/4 of remaining vertical space ─────── */
      .canvas-wrapper {
        flex: 3;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 0;
      }

      canvas {
        display: block !important;
        image-rendering: pixelated;
        image-rendering: crisp-edges;
        width: 100% !important;
        height: auto !important;
        aspect-ratio: 512 / 256 !important;
        max-height: 100% !important;
      }

      /* ── Bottom HUD: reserved for inventory / weapons ── */
      .hud-bottom {
        flex: 1;
        background: #000;
        margin-top: 6px;
      }
    </style>
  </head>
  <body>
    <div class="game-layout">

      <div class="hud-top">
        <div class="resource-bar">
          <div class="bar-track">
            <div class="bar-fill health-fill" id="health-fill"></div>
          </div>
          <span class="bar-label" id="health-label">100 / 100</span>
        </div>
        <div class="resource-bar">
          <div class="bar-track">
            <div class="bar-fill mana-fill" id="mana-fill"></div>
          </div>
          <span class="bar-label" id="mana-label">100 / 100</span>
        </div>
      </div>

      <div class="canvas-wrapper">
        <canvas id="game"></canvas>
      </div>

      <div class="hud-bottom"></div>

    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>

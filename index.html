<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Embershard</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }

      body {
        background: #111;
        width: 100vw;
        height: 100vh;
        overflow: hidden;
        padding: 50px;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      /*
       * Canvas ratio is 512:352 (game area 512×256 + HUD top 32 + HUD bottom 64), all
       * rendered at 3× inside the engine. CSS scaling uses nearest-neighbour so tiles
       * and HUD elements remain pixel-crisp at any display size.
       * max-width = available height × (512 / 352) keeps the canvas fully visible.
       */
      .game-layout {
        width: 100%;
        max-width: calc((100vh - 100px) * 512 / 352);
      }

      canvas {
        display: block !important;
        image-rendering: pixelated;
        image-rendering: crisp-edges;
        width: 100% !important;
        height: auto !important;
        aspect-ratio: 512 / 352 !important;
      }
    </style>
  </head>
  <body>
    <div class="game-layout">
      <canvas id="game"></canvas>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>

<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Embershard</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        background: #111;
        display: flex;
        align-items: center;
        justify-content: center;
        width: 100vw;
        height: 100vh;
        overflow: hidden;
        padding: 50px;
      }
      canvas {
        display: block;
        image-rendering: pixelated;
        image-rendering: crisp-edges;
        /* Scale up to fill available area (window minus padding) while
           preserving the 256x240 aspect ratio. The pixel buffer stays
           256x240 (set by Excalibur Fixed mode) so rendering stays crisp. */
        width: calc(100vw - 100px);
        height: calc(100vh - 100px);
        object-fit: contain;
      }
    </style>
  </head>
  <body>
    <canvas id="game"></canvas>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>

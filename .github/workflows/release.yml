name: Release

on:
  push:
    tags:
      - 'v*.*.*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Format check
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Package build
        run: |
          cd dist
          zip -r ../embershard-${{ github.ref_name }}.zip .

      - name: Extract release notes
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          awk "/^## \[$VERSION\]/{found=1; next} /^## \[/{found=0} found{print}" CHANGELOG.md \
            | sed '/^[[:space:]]*$/d' > /tmp/release-notes.txt
          if [ ! -s /tmp/release-notes.txt ]; then
            echo "No changelog entry found for $VERSION" > /tmp/release-notes.txt
          fi

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ github.ref_name }} \
            --title "Embershard ${{ github.ref_name }}" \
            --notes-file /tmp/release-notes.txt \
            embershard-${{ github.ref_name }}.zip
